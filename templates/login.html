<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Resume Builder</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background-color: #87CEEB; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 1rem; }
    .form-container { background: #fff; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
    h2 { color: #007bff; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 1rem; text-align: left; }
    label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #555; }
    input { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; outline: none; transition: border 0.3s; }
    input:focus { border-color: #007bff; }
    .btn { width: 100%; background: #007bff; color: white; border: none; padding: 0.8rem; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 1rem; transition: background 0.3s; }
    .btn:hover { background: #28a745; }
    .footer-link { margin-top: 1.5rem; font-size: 0.9rem; color: #666; }
    .footer-link a { color: #007bff; text-decoration: none; font-weight: bold; }
    .back-home { display: inline-block; margin-top: 1rem; color: #555; font-size: 0.8rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Welcome Back</h2>
    <form>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <p class="footer-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>
</body>
</html>

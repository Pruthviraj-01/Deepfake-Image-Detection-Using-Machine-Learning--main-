<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Resume - Resume Builder</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Responsive tweaks for the Main Content area */
    .main-content {
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
      /* Ensures content starts after the sidebar on desktop */
      margin-left: 250px; 
      transition: margin-left 0.3s ease;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    /* Form Container Responsiveness */
    .resume-form {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 800px;
      margin: 0 auto;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    form label {
      font-weight: bold;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      box-sizing: border-box; /* Crucial for responsiveness */
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button[type="submit"] {
      background: #007bff;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.3s;
    }

    button[type="submit"]:hover {
      background: #28a745;
    }

    /* --- TABLET & MOBILE BREAKPOINTS --- */
    @media (max-width: 768px) {
      .main-content {
        margin-left: 0; /* Content takes full width when sidebar is hidden/collapsed */
        padding: 15px;
      }

      .resume-form {
        padding: 1.5rem;
      }

      header h2 {
        font-size: 1.4rem;
      }

      button[type="submit"] {
        width: 100%; /* Full width button for easier tapping on mobile */
      }
    }
  </style>
</head>
<body>
  {% include 'sidebar.html' %}

  <div class="main-content">
    <header>
      <h2>Create Resume</h2>
      <div class="user-icon"><i class="fas fa-user-circle" style="font-size: 2rem; color: #007bff;"></i></div>
    </header>

    <section class="resume-form">
      <form>
        <div class="input-group">
          <label>Full Name:</label>
          <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="input-group">
          <label>Email:</label>
          <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label>Phone:</label>
          <input type="text" placeholder="Enter your phone number">
        </div>

        <div class="input-group">
          <label>Experience:</label>
          <textarea placeholder="Describe your experience"></textarea>
        </div>

        <button type="submit">Save Resume</button>
      </form>
    </section>
  </div>
</body>
</html>
